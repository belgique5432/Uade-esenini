<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

<body>
    <header>
        <h1 class="title">Mi primer sitio</h1>
        <nav>
            <ul class="navbar">
            <li><a href="./index.html">Inicio</a></li>
            <li><a href="./intereses.html">Intereses</a></li>
            <li><a href="./contacto.html">contacto</a></li>
            </ul>
        </nav>
    </header>
    <section class="contacto-main">
<form action="/enviar-contacto" method="POST" class="contacto-form">
        <h2>Contáctanos</h2>
        
        <div class="linea-form">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="nombre completo" required>
        </div>

        <div class="linea-form"> 
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="falso123@gmail.com" required>
        </div>

        <div class="linea-form">
            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe tu mensaje aquí..." required></textarea>
        </div>

        <button class="linea-form" type="submit">Enviar Mensaje</button>
    </form>
    </section>

    <footer>
        <p>Todos los derechos reservados</p>
    </footer>   
</body>
</html>
